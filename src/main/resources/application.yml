spring:
  application:
    name: clube-do-album-ratings-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://127.0.0.1:15432/clube_do_album_ratings}
    username: ${DATABASE_USERNAME:clube}
    password: ${DATABASE_PASSWORD:clube}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:clube}
    password: ${RABBITMQ_PASSWORD:clube}

server:
  port: ${SERVER_PORT:8082}

app:
  rabbitmq:
    exchange: ${RABBITMQ_EXCHANGE:clube-do-album.events}
    album-rated-routing-key: ${ALBUM_RATED_ROUTING_KEY:album.rated}
